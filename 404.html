<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found - Pahechan</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 100px;
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 20px;
    }

    a {
      text-decoration: none;
      color: #ff4b2b;
      background: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      background: #ffe0db;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>404</h1>
    <h2>Oops! Page not found</h2>
    <p>The page you’re looking for doesn’t exist or has been moved.</p>
    <br>
    <a href="index.html">Go Back Home</a>
  </div>
</body>
</html>
